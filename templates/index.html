<!doctype html>
<html>
  <head>
    <title>AI Fraud Detection System</title>

    <style>
      body {
        font-family: "Segoe UI", Arial;
        background: #f1f5f9;
        margin: 0;
      }

      .header {
        background: #1e293b;
        color: white;
        text-align: center;
        padding: 20px;
        font-size: 22px;
      }

      .container {
        display: flex;
        justify-content: center;
        margin-top: 40px;
      }

      .card {
        background: white;
        padding: 35px;
        border-radius: 12px;
        width: 450px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .info {
        text-align: center;
        margin-bottom: 20px;
        color: #6b7280;
      }

      label {
        font-weight: 600;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        margin-bottom: 18px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }

      .footer {
        text-align: center;
        margin-top: 30px;
        color: #9ca3af;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <div class="header">AI Financial Fraud Detection Dashboard</div>

    <div class="container">
      <div class="card">
        <div class="info">Enter transaction details to evaluate fraud risk</div>

        <form action="/predict-ui" method="post">
          <label>Transaction Type</label>
          <select name="type">
            <option value="TRANSFER">TRANSFER</option>
            <option value="CASH_OUT">CASH_OUT</option>
            <option value="CASH_IN">CASH_IN</option>
            <option value="PAYMENT">PAYMENT</option>
            <option value="DEBIT">DEBIT</option>
          </select>

          <label>Transaction Amount</label>
          <input
            type="number"
            name="amount"
            placeholder="Example: 50000"
            required
          />

          <label>Sender Balance Before Transaction</label>
          <input
            type="number"
            name="oldbalanceOrg"
            placeholder="Example: 60000"
            required
          />

          <label>Sender Balance After Transaction</label>
          <input
            type="number"
            name="newbalanceOrig"
            placeholder="Example: 10000"
            required
          />

          <label>Receiver Balance Before Transaction</label>
          <input
            type="number"
            name="oldbalanceDest"
            placeholder="Example: 0"
            required
          />

          <label>Receiver Balance After Transaction</label>
          <input
            type="number"
            name="newbalanceDest"
            placeholder="Example: 50000"
            required
          />

          <button type="submit">Analyze Transaction</button>
        </form>
      </div>
    </div>

    <div class="footer">Fraud Detection System | Machine Learning Demo</div>
  </body>
</html>
